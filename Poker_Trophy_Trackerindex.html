lex items-center gap-2 transition-all relative text-amber-400"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>Statistiques<div class="absolute bottom-0 left-0 right-0 h-0.5 bg-gradient-to-r from-amber-400 to-amber-600"></div></button></div></div></nav><main class="relative max-w-7xl mx-auto px-6 py-12"><div class="space-y-8"><h2 class="text-3xl font-serif font-bold text-amber-400 mb-6">Statistiques des Joueurs</h2><div class="text-center py-16 bg-black/20 rounded-2xl border border-white/10"><svg class="w-16 h-16 text-white/30 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg><p class="text-xl text-white/60">Pas encore de statistiques</p></div></div></main><footer class="relative border-t border-white/10 bg-black/30 backdrop-blur-sm mt-16"><div class="max-w-7xl mx-auto px-6 py-6 text-center text-white/40 text-sm"><p>Poker Trophy Tracker • Données sauvegardées localement dans votre navigateur</p></div></footer></div></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        
        // Lucide icons as inline SVG components
        const Trophy = ({ className = "w-6 h-6" }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 15v5m0 0H9m3 0h3M9 3h6a3 3 0 0 1 3 3v6a9 9 0 1 1-18 0V6a3 3 0 0 1 3-3Z"/>
            </svg>
        );

        const Plus = ({ className = "w-6 h-6" }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4"/>
            </svg>
        );

        const Users = ({ className = "w-6 h-6" }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/>
            </svg>
        );

        const Calendar = ({ className = "w-6 h-6" }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
            </svg>
        );

        const Target = ({ className = "w-6 h-6" }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2zm0 16c-3.3 0-6-2.7-6-6s2.7-6 6-6 6 2.7 6 6-2.7 6-6 6zm0-10c-2.2 0-4 1.8-4 4s1.8 4 4 4 4-1.8 4-4-1.8-4-4-4z"/>
            </svg>
        );

        const Crown = ({ className = "w-6 h-6" }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 3l7 9 7-9v14H5V3z"/>
                <circle cx="12" cy="5" r="1.5" fill="currentColor"/>
                <circle cx="5" cy="3" r="1.5" fill="currentColor"/>
                <circle cx="19" cy="3" r="1.5" fill="currentColor"/>
            </svg>
        );

        const TrendingUp = ({ className = "w-6 h-6" }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/>
            </svg>
        );

        const X = ({ className = "w-6 h-6" }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12"/>
            </svg>
        );

        const Check = ({ className = "w-6 h-6" }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7"/>
            </svg>
        );

        const Trash2 = ({ className = "w-6 h-6" }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2m3 0v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6h14z"/>
            </svg>
        );

        const Clock = ({ className = "w-6 h-6" }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
        );

        const Play = ({ className = "w-6 h-6" }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/>
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
        );

        const Pause = ({ className = "w-6 h-6" }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10 9v6m4-6v6m7-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
        );

        const RotateCcw = ({ className = "w-6 h-6" }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6"/>
            </svg>
        );

        const ChevronUp = ({ className = "w-6 h-6" }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 15l7-7 7 7"/>
            </svg>
        );

        const ChevronDown = ({ className = "w-6 h-6" }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7"/>
            </svg>
        );

        const Volume2 = ({ className = "w-6 h-6" }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M11 5L6 9H2v6h4l5 4V5zM15.54 8.46a5 5 0 010 7.07M19.07 4.93a10 10 0 010 14.14"/>
            </svg>
        );

        const Skull = ({ className = "w-6 h-6" }) => (
            <svg className={className} fill="currentColor" viewBox="0 0 24 24">
                <path d="M12 2C6.48 2 2 6.48 2 12c0 3.69 2.47 6.86 6 8.25V22h8v-1.75c3.53-1.39 6-4.56 6-8.25 0-5.52-4.48-10-10-10zm-2 15c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm4 0c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm2-5h-8V9.5C8 7.57 9.57 6 11.5 6h1c1.93 0 3.5 1.57 3.5 3.5V12z"/>
                <circle cx="9" cy="10" r="1" fill="#fff"/>
                <circle cx="15" cy="10" r="1" fill="#fff"/>
            </svg>
        );

        const BookOpen = ({ className = "w-6 h-6" }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
            </svg>
        );

        // Blind Structure - Temps dégressif pour partie de 50 jetons
        const BLIND_STRUCTURE = [
            { level: 1, sb: 1, bb: 2, duration: 30 * 60 },      // 30 min - Début tranquille
            { level: 2, sb: 2, bb: 4, duration: 25 * 60 },      // 25 min
            { level: 3, sb: 3, bb: 6, duration: 20 * 60 },      // 20 min
            { level: 4, sb: 5, bb: 10, duration: 15 * 60 },     // 15 min
            { level: 5, sb: 8, bb: 16, duration: 12 * 60 },     // 12 min - Ça accélère
            { level: 6, sb: 10, bb: 20, duration: 10 * 60 },    // 10 min
            { level: 7, sb: 15, bb: 30, duration: 8 * 60 },     // 8 min
            { level: 8, sb: 25, bb: 50, duration: 6 * 60 },     // 6 min - Fin de partie
            { level: 9, sb: 40, bb: 80, duration: 5 * 60 },     // 5 min
            { level: 10, sb: 50, bb: 100, duration: 5 * 60 }    // 5 min - All-in mode
        ];

        const BlindTimer = ({ onClose }) => {
            const [currentLevel, setCurrentLevel] = useState(0);
            const [timeLeft, setTimeLeft] = useState(BLIND_STRUCTURE[0].duration);
            const [isRunning, setIsRunning] = useState(false);
            const [soundEnabled, setSoundEnabled] = useState(true);
            const [voiceEnabled, setVoiceEnabled] = useState(true);
            const [hasPlayedWarning, setHasPlayedWarning] = useState(false);

            useEffect(() => {
                let interval;
                if (isRunning && timeLeft > 0) {
                    interval = setInterval(() => {
                        setTimeLeft(prev => {
                            // Alerte 5 secondes avant la fin
                            if (prev === 6 && soundEnabled && !hasPlayedWarning) {
                                playWarningSound();
                                setHasPlayedWarning(true);
                            }
                            
                            if (prev <= 1) {
                                // Niveau terminé
                                if (soundEnabled) playLevelUpSound();
                                if (currentLevel < BLIND_STRUCTURE.length - 1) {
                                    const nextLevel = currentLevel + 1;
                                    setCurrentLevel(nextLevel);
                                    setHasPlayedWarning(false);
                                    
                                    // Annonce vocale de la nouvelle BB
                                    if (voiceEnabled) {
                                        announceNewBlinds(BLIND_STRUCTURE[nextLevel].bb);
                                    }
                                    
                                    return BLIND_STRUCTURE[nextLevel].duration;
                                } else {
                                    setIsRunning(false);
                                    return 0;
                                }
                            }
                            return prev - 1;
                        });
                    }, 1000);
                }
                return () => clearInterval(interval);
            }, [isRunning, timeLeft, currentLevel, soundEnabled, voiceEnabled, hasPlayedWarning]);

            const announceNewBlinds = (bb) => {
                if ('speechSynthesis' in window) {
                    const utterance = new SpeechSynthesisUtterance(`Nouvelle big blind : ${bb}`);
                    utterance.lang = 'fr-FR';
                    utterance.rate = 0.9;
                    utterance.pitch = 1.1;
                    window.speechSynthesis.speak(utterance);
                }
            };

            const playWarningSound = () => {
                // Son d'alerte de 5 secondes - bips répétés
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                
                for (let i = 0; i < 5; i++) {
                    const oscillator = audioContext.createOscillator();
                    const gainNode = audioContext.createGain();
                    
                    oscillator.connect(gainNode);
                    gainNode.connect(audioContext.destination);
                    
                    oscillator.frequency.value = 600;
                    oscillator.type = 'square';
                    
                    const startTime = audioContext.currentTime + i;
                    gainNode.gain.setValueAtTime(0.2, startTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, startTime + 0.15);
                    
                    oscillator.start(startTime);
                    oscillator.stop(startTime + 0.15);
                }
            };

            const playLevelUpSound = () => {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                
                oscillator.frequency.value = 800;
                oscillator.type = 'sine';
                gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);
                
                oscillator.start(audioContext.currentTime);
                oscillator.stop(audioContext.currentTime + 0.5);
            };

            const formatTime = (seconds) => {
                const mins = Math.floor(seconds / 60);
                const secs = seconds % 60;
                return `${mins}:${secs.toString().padStart(2, '0')}`;
            };

            const toggleTimer = () => setIsRunning(!isRunning);
            
            const resetTimer = () => {
                setIsRunning(false);
                setCurrentLevel(0);
                setTimeLeft(BLIND_STRUCTURE[0].duration);
                setHasPlayedWarning(false);
            };

            const nextLevel = () => {
                if (currentLevel < BLIND_STRUCTURE.length - 1) {
                    setCurrentLevel(currentLevel + 1);
                    setTimeLeft(BLIND_STRUCTURE[currentLevel + 1].duration);
                    setIsRunning(false);
                    setHasPlayedWarning(false);
                }
            };

            const prevLevel = () => {
                if (currentLevel > 0) {
                    setCurrentLevel(currentLevel - 1);
                    setTimeLeft(BLIND_STRUCTURE[currentLevel - 1].duration);
                    setIsRunning(false);
                    setHasPlayedWarning(false);
                }
            };

            const handleTimeChange = (e) => {
                const newTime = parseInt(e.target.value);
                setTimeLeft(newTime);
                setHasPlayedWarning(false);
            };

            const current = BLIND_STRUCTURE[currentLevel];
            const next = currentLevel < BLIND_STRUCTURE.length - 1 ? BLIND_STRUCTURE[currentLevel + 1] : null;
            const progress = ((current.duration - timeLeft) / current.duration) * 100;

            // Warning colors
            const isWarning = timeLeft <= 60;
            const isCritical = timeLeft <= 10;

            return (
                <div className="fixed inset-0 bg-black/90 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                    <div className="bg-gradient-to-br from-slate-800 to-slate-900 rounded-3xl shadow-2xl max-w-2xl w-full max-h-[90vh] border-2 border-amber-500/50 flex flex-col">
                        {/* Header - Fixe */}
                        <div className="bg-gradient-to-r from-amber-500/20 to-amber-600/20 border-b border-amber-500/30 p-6 flex-shrink-0">
                            <div className="flex items-center justify-between">
                                <div className="flex items-center gap-3">
                                    <Clock className="w-8 h-8 text-amber-400" />
                                    <h2 className="text-2xl font-serif font-bold text-amber-400">Timer de Blindes</h2>
                                </div>
                                <button
                                    onClick={onClose}
                                    className="w-10 h-10 rounded-full bg-red-500/20 hover:bg-red-500/30 flex items-center justify-center transition-all"
                                >
                                    <X className="w-6 h-6 text-red-400" />
                                </button>
                            </div>
                        </div>

                        {/* Contenu scrollable */}
                        <div className="overflow-y-auto flex-1 p-8">
                            {/* Current Level Info */}
                            <div className="text-center mb-8">
                                <div className="text-sm font-semibold text-emerald-300 mb-2">NIVEAU {current.level}</div>
                                <div className="flex items-center justify-center gap-4 mb-6">
                                    <div className="text-center">
                                        <div className="text-xs text-white/60 mb-1">Small Blind</div>
                                        <div className="text-4xl font-bold text-white">{current.sb}</div>
                                    </div>
                                    <div className="text-white/40 text-3xl">/</div>
                                    <div className="text-center">
                                        <div className="text-xs text-white/60 mb-1">Big Blind</div>
                                        <div className="text-4xl font-bold text-amber-400">{current.bb}</div>
                                    </div>
                                </div>

                                {/* Time Display */}
                                <div className={`text-8xl font-bold mb-4 transition-all ${
                                    isCritical ? 'text-red-500 animate-pulse' :
                                    isWarning ? 'text-orange-500' :
                                    'text-white'
                                }`}>
                                    {formatTime(timeLeft)}
                                </div>

                                {/* Time Slider */}
                                <div className="mb-6">
                                    <input
                                        type="range"
                                        min="0"
                                        max={current.duration}
                                        value={timeLeft}
                                        onChange={handleTimeChange}
                                        disabled={isRunning}
                                        className="w-full h-3 bg-black/40 rounded-full appearance-none cursor-pointer disabled:cursor-not-allowed"
                                        style={{
                                            background: `linear-gradient(to right, 
                                                ${isCritical ? '#ef4444' : isWarning ? '#f97316' : '#10b981'} 0%, 
                                                ${isCritical ? '#ef4444' : isWarning ? '#f97316' : '#10b981'} ${progress}%, 
                                                rgba(0,0,0,0.4) ${progress}%, 
                                                rgba(0,0,0,0.4) 100%)`
                                        }}
                                    />
                                    <div className="flex justify-between text-xs text-white/60 mt-2">
                                        <span>0:00</span>
                                        <span>{formatTime(current.duration)}</span>
                                    </div>
                                </div>
                            </div>

                            {/* Controls */}
                            <div className="flex items-center justify-center gap-4 mb-8">
                                <button
                                    onClick={prevLevel}
                                    disabled={currentLevel === 0}
                                    className="w-12 h-12 rounded-full bg-white/10 hover:bg-white/20 disabled:opacity-30 disabled:cursor-not-allowed flex items-center justify-center transition-all"
                                >
                                    <ChevronDown className="w-6 h-6 rotate-90" />
                                </button>

                                <button
                                    onClick={toggleTimer}
                                    className="w-20 h-20 rounded-full bg-gradient-to-r from-emerald-600 to-emerald-700 hover:from-emerald-500 hover:to-emerald-600 flex items-center justify-center transition-all shadow-lg shadow-emerald-500/50"
                                >
                                    {isRunning ? <Pause className="w-10 h-10" /> : <Play className="w-10 h-10 ml-1" />}
                                </button>

                                <button
                                    onClick={nextLevel}
                                    disabled={currentLevel === BLIND_STRUCTURE.length - 1}
                                    className="w-12 h-12 rounded-full bg-white/10 hover:bg-white/20 disabled:opacity-30 disabled:cursor-not-allowed flex items-center justify-center transition-all"
                                >

        const PokerTrophyTracker = () => {
            const [games, setGames] = useState([]);
            const [currentHolder, setCurrentHolder] = useState(null);
            const [loading, setLoading] = useState(true);
            const [view, setView] = useState('overview');
            const [showAddForm, setShowAddForm] = useState(false);
            const [showTimer, setShowTimer] = useState(false);
            const [showGuide, setShowGuide] = useState(false);

            const [newGame, setNewGame] = useState({
                date: new Date().toISOString().split('T')[0],
                players: [],
                rankings: [],
                eliminations: [],
                signatures: {}
            });

            const [playerInput, setPlayerInput] = useState('');
            const [eliminationFrom, setEliminationFrom] = useState('');
            const [eliminationBy, setEliminationBy] = useState('');

            useEffect(() => {
                loadGames();
            }, []);

            const loadGames = () => {
                try {
                    const data = localStorage.getItem('poker-trophy-data');
                    if (data) {
                        const parsed = JSON.parse(data);
                        setGames(parsed.games || []);
                        setCurrentHolder(parsed.currentHolder || null);
                    }
                } catch (error) {
                    console.log('No existing data, starting fresh');
                } finally {
                    setLoading(false);
                }
            };

            const saveGames = (updatedGames, newHolder) => {
                try {
                    localStorage.setItem('poker-trophy-data', JSON.stringify({
                        games: updatedGames,
                        currentHolder: newHolder
                    }));
                } catch (error) {
                    console.error('Error saving:', error);
                }
            };

            const addPlayer = () => {
                if (playerInput.trim() && !newGame.players.includes(playerInput.trim())) {
                    setNewGame({
                        ...newGame,
                        players: [...newGame.players, playerInput.trim()]
                    });
                    setPlayerInput('');
                }
            };

            const removePlayer = (player) => {
                setNewGame({
                    ...newGame,
                    players: newGame.players.filter(p => p !== player),
                    rankings: newGame.rankings.filter(r => r !== player),
                    eliminations: newGame.eliminations.filter(e => e.eliminated !== player && e.eliminator !== player)
                });
            };

            const setRanking = (player, position) => {
                const newRankings = [...newGame.rankings];
                newRankings[position] = player;
                setNewGame({ ...newGame, rankings: newRankings });
            };

            const addElimination = () => {
                if (eliminationFrom && eliminationBy && eliminationFrom !== eliminationBy) {
                    const exists = newGame.eliminations.some(e => e.eliminated === eliminationFrom);
                    if (!exists) {
                        setNewGame({
                            ...newGame,
                            eliminations: [...newGame.eliminations, {
                                eliminated: eliminationFrom,
                                eliminator: eliminationBy
                            }]
                        });
                        setEliminationFrom('');
                        setEliminationBy('');
                    }
                }
            };

            const removeElimination = (eliminated) => {
                setNewGame({
                    ...newGame,
                    eliminations: newGame.eliminations.filter(e => e.eliminated !== eliminated)
                });
            };

            const toggleSignature = (player) => {
                setNewGame({
                    ...newGame,
                    signatures: {
                        ...newGame.signatures,
                        [player]: !newGame.signatures[player]
                    }
                });
            };

            const submitGame = () => {
                if (newGame.players.length < 2) {
                    alert('Il faut au moins 2 joueurs !');
                    return;
                }

                if (newGame.rankings.length === 0) {
                    alert('Veuillez définir le classement !');
                    return;
                }

                const allSigned = newGame.players.every(p => newGame.signatures[p]);
                if (!allSigned) {
                    alert('Tous les joueurs doivent signer !');
                    return;
                }

                const game = {
                    id: Date.now(),
                    date: newGame.date,
                    players: newGame.players,
                    rankings: newGame.rankings.filter(r => r),
                    winner: newGame.rankings[0],
                    eliminations: newGame.eliminations,
                    signatures: newGame.signatures,
                    timestamp: new Date().toISOString()
                };

                const updatedGames = [game, ...games];
                setGames(updatedGames);
                setCurrentHolder(game.winner);
                saveGames(updatedGames, game.winner);

                setNewGame({
                    date: new Date().toISOString().split('T')[0],
                    players: [],
                    rankings: [],
                    eliminations: [],
                    signatures: {}
                });
                setShowAddForm(false);
                setView('overview');
            };

            const deleteGame = (gameId) => {
                if (!confirm('Supprimer cette partie ?')) return;
                
                const updatedGames = games.filter(g => g.id !== gameId);
                const newHolder = updatedGames.length > 0 ? updatedGames[0].winner : null;
                setGames(updatedGames);
                setCurrentHolder(newHolder);
                saveGames(updatedGames, newHolder);
            };

            const getPlayerStats = () => {
                const stats = {};
                games.forEach(game => {
                    game.players.forEach(player => {
                        if (!stats[player]) {
                            stats[player] = { games: 0, wins: 0, eliminations: 0, eliminated: 0, points: 0 };
                        }
                        stats[player].games++;
                        if (game.winner === player) stats[player].wins++;
                        
                        // Points system based on ranking
                        const playerRank = game.rankings.indexOf(player);
                        if (playerRank !== -1) {
                            // 1st = 10 pts, 2nd = 6 pts, 3rd = 4 pts, 4th = 2 pts, 5th+ = 1 pt
                            const pointsMap = [10, 6, 4, 2, 1, 1, 1, 1, 1, 1];
                            stats[player].points += pointsMap[playerRank] || 1;
                        }
                    });
                    game.eliminations.forEach(elim => {
                        if (stats[elim.eliminator]) stats[elim.eliminator].eliminations++;
                        if (stats[elim.eliminated]) stats[elim.eliminated].eliminated++;
                    });
                });
                // Sort by points instead of wins
                return Object.entries(stats).sort((a, b) => b[1].points - a[1].points);
            };

                                        <p className="text-sm text-emerald-300/70">Registre Officiel</p>

                                    >
                                        <BookOpen className="w-5 h-5" />
                                        Guide
                                    </button>
                                    <button
                                        onClick={() => setShowTimer(true)}
                                        className="px-6 py-3 bg-gradient-to-r from-blue-600 to-blue-700 hover:from-blue-500 hover:to-blue-600 rounded-lg font-semibold flex items-center gap-2 transition-all shadow-lg shadow-blue-500/30 hover:shadow-blue-500/50"
                                    >
                                        <Clock className="w-5 h-5" />
                                        Timer
                                    </button>
                                    <button

                                        Nouvelle Partie

                                                <X className="w-6 h-6 text-red-400" />

                                                <label className="block text-sm font-semibold text-emerald-300 mb-3">Classement Final</label>
                                                <div className="space-y-2">
                                                    {[...Array(Math.min(newGame.players.length, 5))].map((_, index) => (
                                                        <div key={index} className="flex items-center gap-3">
                                                            <div className={`w-10 h-10 rounded-full flex items-center justify-center font-bold ${
                                                                index === 0 ? 'bg-gradient-to-br from-amber-400 to-amber-600 text-slate-900' :
                                                                index === 1 ? 'bg-gradient-to-br from-slate-300 to-slate-400 text-slate-900' :
                                                                index === 2 ? 'bg-gradient-to-br from-amber-700 to-amber-800 text-white' :
                                                                'bg-slate-700 text-white'
                                                            }`}>
                                                                {index + 1}
                                                            </div>
                                                            <select
                                                                value={newGame.rankings[index] || ''}
                                                                onChange={(e) => setRanking(e.target.value, index)}
                                                                className="flex-1 px-4 py-3 bg-black/40 border border-white/20 rounded-lg focus:outline-none focus:border-amber-500 text-white"
                                                            >
                                                                <option value="">Sélectionner...</option>
                                                                {newGame.players
                                                                    .filter(p => !newGame.rankings.includes(p) || newGame.rankings[index] === p)
                                                                    .map(player => (
                                                                        <option key={player} value={player}>{player}</option>
                                                                    ))
                                                                }
                                                            </select>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        )}

                                        {newGame.players.length > 1 && (
                                            <div className="mb-8">
                                                <label className="block text-sm font-semibold text-emerald-300 mb-3 flex items-center gap-2">
                                                    <Skull className="w-5 h-5 text-red-400" />
                                                    Éliminations
                                                </label>
                                                <div className="flex gap-2 mb-4">
                                                    <select
                                                        value={eliminationFrom}
                                                        onChange={(e) => setEliminationFrom(e.target.value)}
                                                        className="flex-1 px-4 py-3 bg-black/40 border border-white/20 rounded-lg focus:outline-none focus:border-amber-500 text-white"
                                                    >
                                                        <option value="">Éliminé...</option>
                                                        {newGame.players
                                                            .filter(p => !newGame.eliminations.some(e => e.eliminated === p))
                                                            .map(player => (
                                                                <option key={player} value={player}>{player}</option>
                                                            ))
                                                        }
                                                    </select>
                                                    <span className="px-4 py-3 text-white/60 font-semibold">💀 par</span>
                                                    <select
                                                        value={eliminationBy}
                                                        onChange={(e) => setEliminationBy(e.target.value)}
                                                        className="flex-1 px-4 py-3 bg-black/40 border border-white/20 rounded-lg focus:outline-none focus:border-amber-500 text-white"
                                                    >
                                                        <option value="">Éliminateur...</option>
                                                        {newGame.players.map(player => (
                                                            <option key={player} value={player}>{player}</option>
                                                        ))}
                                                    </select>
                                                    <button
                                                        onClick={addElimination}
                                                        className="px-6 py-3 bg-red-600 hover:bg-red-500 rounded-lg font-semibold transition-all flex items-center gap-2"
                                                    >
                                                        <Skull className="w-5 h-5" />
                                                    </button>
                                                </div>
                                                <div className="space-y-2">
                                                    {newGame.eliminations.map(elim => (
                                                        <div key={elim.eliminated} className="px-4 py-3 bg-red-500/10 border border-red-500/30 rounded-lg flex items-center justify-between hover:bg-red-500/20 transition-all">
                                                            <div className="flex items-center gap-3">
                                                                <Skull className="w-6 h-6 text-red-400" />
                                                                <span className="text-white/90">
                                                                    <span className="font-medium text-red-400">{elim.eliminated}</span>
                                                                    {' 💀 '}
                                                                    <span className="font-medium text-emerald-400">{elim.eliminator}</span>
                                                                </span>
                                                            </div>
                                                            <button
                                                                onClick={() => removeElimination(elim.eliminated)}
                                                                className="w-6 h-6 rounded-full bg-red-500/30 hover:bg-red-500/50 flex items-center justify-center transition-all"
                                                            >
                                                                <X className="w-4 h-4" />
                                                            </button>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        )}

                                        {newGame.players.length > 0 && (
                                            <div className="mb-8">
                                                <label className="block text-sm font-semibold text-emerald-300 mb-3">Signatures</label>
                                                <div className="grid grid-cols-2 gap-3">
                                                    {newGame.players.map(player => (
                                                        <button
                                                            key={player}
                                                            onClick={() => toggleSignature(player)}
                                                            className={`px-4 py-3 rounded-lg font-medium transition-all border-2 ${
                                                                newGame.signatures[player]
                                                                    ? 'bg-emerald-500/20 border-emerald-500 text-emerald-300'
                                                                    : 'bg-black/40 border-white/20 text-white/60 hover:border-white/40'
                                                            }`}
                                                        >
                                                            <div className="flex items-center justify-between">
                                                                <span>{player}</span>
                                                                {newGame.signatures[player] && <Check className="w-5 h-5" />}
                                                            </div>
                                                        </button>
                                                    ))}
                                                </div>
                                            </div>
                                        )}

                                        <button
                                            onClick={submitGame}
                                            className="w-full py-4 bg-gradient-to-r from-amber-500 to-amber-600 hover:from-amber-400 hover:to-amber-500 rounded-lg font-bold text-lg text-slate-900 transition-all shadow-lg shadow-amber-500/30"
                                        >
                                            Enregistrer la Partie
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'overview' && (
                            <div className="space-y-8">
                                {currentHolder ? (
                                    <div className="relative overflow-hidden rounded-2xl bg-gradient-to-br from-amber-500/20 via-amber-600/20 to-amber-700/20 border border-amber-500/40 p-8 shadow-2xl">
                                        <div className="absolute top-0 right-0 w-64 h-64 bg-amber-500/10 rounded-full blur-3xl"></div>
                                        <div className="relative z-10">
                                            <div className="flex items-center gap-6 mb-6">
                                                <div className="w-24 h-24 rounded-full bg-gradient-to-br from-amber-400 to-amber-600 flex items-center justify-center shadow-lg shadow-amber-500/50 animate-pulse">
                                                    <Crown className="w-12 h-12 text-slate-900" />
                                                </div>
                                                <div>
                                                    <p className="text-sm font-semibold text-amber-300 mb-1">Détenteur Actuel du Trophée</p>
                                                    <h2 className="text-5xl font-serif font-bold text-white">{currentHolder}</h2>
                                                </div>
                                            </div>
                                            <div className="flex items-center gap-4 text-amber-200/80">
                                                <div className="flex items-center gap-2">
                                                    <Calendar className="w-4 h-4" />
                                                    <span className="text-sm">Depuis le {new Date(games[0].date).toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' })}</span>
                                                </div>
                                                <div className="flex items-center gap-2">
                                                    <Users className="w-4 h-4" />
                                                    <span className="text-sm">{games[0].players.length} joueurs</span>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="text-center py-16 bg-black/20 rounded-2xl border border-white/10">
                                        <Trophy className="w-16 h-16 text-amber-500/50 mx-auto mb-4" />
                                        <p className="text-xl text-white/60">Aucune partie enregistrée</p>
                                        <p className="text-sm text-white/40 mt-2">Commencez par ajouter votre première partie !</p>
                                    </div>
                                )}

                                {games.length > 0 && (
                                    <div className="grid grid-cols-3 gap-6">
                                        <div className="bg-gradient-to-br from-slate-800/80 to-slate-900/80 backdrop-blur-sm rounded-xl border border-white/10 p-6">
                                            <div className="flex items-center gap-3 mb-2">
                                                <div className="w-10 h-10 rounded-full bg-emerald-500/20 flex items-center justify-center">
                                                    <Target className="w-5 h-5 text-emerald-400" />
                                                </div>
                                                <span className="text-2xl font-bold text-white">{games.length}</span>
                                            </div>
                                            <p className="text-sm text-white/60">Parties Jouées</p>
                                        </div>
                                        <div className="bg-gradient-to-br from-slate-800/80 to-slate-900/80 backdrop-blur-sm rounded-xl border border-white/10 p-6">
                                            <div className="flex items-center gap-3 mb-2">
                                                <div className="w-10 h-10 rounded-full bg-amber-500/20 flex items-center justify-center">
                                                    <Users className="w-5 h-5 text-amber-400" />
                                                </div>
                                                <span className="text-2xl font-bold text-white">{new Set(games.flatMap(g => g.players)).size}</span>
                                            </div>
                                            <p className="text-sm text-white/60">Joueurs Uniques</p>
                                        </div>
                                        <div className="bg-gradient-to-br from-slate-800/80 to-slate-900/80 backdrop-blur-sm rounded-xl border border-white/10 p-6">
                                            <div className="flex items-center gap-3 mb-2">
                                                <div className="w-10 h-10 rounded-full bg-red-500/20 flex items-center justify-center">
                                                    <Skull className="w-5 h-5 text-red-400" />
                                                </div>
                                                <span className="text-2xl font-bold text-white">{games.reduce((sum, g) => sum + g.eliminations.length, 0)}</span>
                                            </div>
                                            <p className="text-sm text-white/60">Éliminations Totales</p>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {view === 'history' && (
                            <div className="space-y-6">
                                <h2 className="text-3xl font-serif font-bold text-amber-400 mb-6">Historique des Parties</h2>
                                {games.length === 0 ? (
                                    <div className="text-center py-16 bg-black/20 rounded-2xl border border-white/10">
                                        <Calendar className="w-16 h-16 text-white/30 mx-auto mb-4" />
                                        <p className="text-xl text-white/60">Aucune partie dans l'historique</p>
                                    </div>
                                ) : (
                                    <div className="space-y-4">
                                        {games.map((game, index) => (
                                            <div key={game.id} className="bg-gradient-to-br from-slate-800/80 to-slate-900/80 backdrop-blur-sm rounded-xl border border-white/10 overflow-hidden">
                                                <div className="p-6">
                                                    <div className="flex items-start justify-between mb-4">
                                                        <div className="flex items-center gap-4">
                                                            <div className={`w-12 h-12 rounded-full flex items-center justify-center font-bold ${
                                                                index === 0 ? 'bg-gradient-to-br from-amber-400 to-amber-600 text-slate-900' :
                                                                'bg-slate-700 text-white'
                                                            }`}>
                                                                {index === 0 ? <Crown className="w-6 h-6" /> : index + 1}
                                                            </div>
                                                            <div>
                                                                <div className="flex items-center gap-3">
                                                                    <h3 className="text-xl font-bold text-white">{game.winner}</h3>
                                                                    <span className="px-3 py-1 bg-amber-500/20 border border-amber-500/40 rounded-full text-xs font-semibold text-amber-300">
                                                                        Vainqueur
                                                                    </span>
                                                                </div>
                                                                <p className="text-sm text-white/60 mt-1">
                                                                    {new Date(game.date).toLocaleDateString('fr-FR', { 
                                                                        weekday: 'long', 
                                                                        day: 'numeric', 
                                                                        month: 'long', 
                                                                        year: 'numeric' 
                                                                    })}
                                                                </p>
                                                            </div>
                                                        </div>
                                                        <button
                                                            onClick={() => deleteGame(game.id)}
                                                            className="w-10 h-10 rounded-full bg-red-500/20 hover:bg-red-500/30 flex items-center justify-center transition-all"
                                                        >
                                                            <Trash2 className="w-5 h-5 text-red-400" />
                                                        </button>
                                                    </div>

                                                    <div className="mb-4">
                                                        <p className="text-xs font-semibold text-emerald-300 mb-2">CLASSEMENT</p>
                                                        <div className="flex flex-wrap gap-2">
                                                            {game.rankings.map((player, pos) => (
                                                                <div key={player} className={`px-3 py-1.5 rounded-lg flex items-center gap-2 ${
                                                                    pos === 0 ? 'bg-amber-500/20 border border-amber-500/40 text-amber-300' :
                                                                    pos === 1 ? 'bg-slate-500/20 border border-slate-400/40 text-slate-300' :
                                                                    pos === 2 ? 'bg-amber-700/20 border border-amber-700/40 text-amber-400' :
                                                                    'bg-white/5 border border-white/20 text-white/70'
                                                                }`}>
                                                                    <span className="font-bold text-xs">{pos + 1}</span>
                                                                    <span className="text-sm font-medium">{player}</span>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    </div>

                                                    {game.eliminations.length > 0 && (
                                                        <div className="mb-4">
                                                            <p className="text-xs font-semibold text-emerald-300 mb-2 flex items-center gap-2">
                                                                <Skull className="w-4 h-4 text-red-400" />
                                                                ÉLIMINATIONS
                                                            </p>
                                                            <div className="space-y-2">
                                                                {game.eliminations.map(elim => (
                                                                    <div key={elim.eliminated} className="px-3 py-2 bg-red-500/5 border border-red-500/20 rounded-lg flex items-center gap-2">
                                                                        <Skull className="w-5 h-5 text-red-400 flex-shrink-0" />
                                                                        <span className="text-sm text-white/90">
                                                                            <span className="text-red-400 font-medium">{elim.eliminated}</span>
                                                                            {' 💀 '}
                                                                            <span className="text-emerald-400 font-medium">{elim.eliminator}</span>
                                                                        </span>
                                                                    </div>
                                                                ))}
                                                            </div>
                                                        </div>
                                                    )}

                                                    <div>
                                                        <p className="text-xs font-semibold text-emerald-300 mb-2">SIGNATURES VALIDÉES</p>
                                                        <div className="flex flex-wrap gap-2">
                                                            {Object.entries(game.signatures)
                                                                .filter(([_, signed]) => signed)
                                                                .map(([player]) => (
                                                                    <div key={player} className="px-3 py-1 bg-emerald-500/10 border border-emerald-500/30 rounded-full text-xs font-medium text-emerald-300 flex items-center gap-1">
                                                                        <Check className="w-3 h-3" />
                                                                        {player}
                                                                    </div>
                                                                ))
                                                            }
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}

                        {view === 'stats' && (
                            <div className="space-y-8">
                                <h2 className="text-3xl font-serif font-bold text-amber-400 mb-6">Statistiques des Joueurs</h2>
                                {games.length === 0 ? (
                                    <div className="text-center py-16 bg-black/20 rounded-2xl border border-white/10">
                                        <TrendingUp className="w-16 h-16 text-white/30 mx-auto mb-4" />
                                        <p className="text-xl text-white/60">Pas encore de statistiques</p>
                                    </div>
                                ) : (
                                    <div className="space-y-4">
                                        {/* Explication du système de points */}
                                        <div className="bg-gradient-to-r from-blue-500/10 to-purple-500/10 border border-blue-500/30 rounded-xl p-6">
                                            <h3 className="text-lg font-bold text-blue-300 mb-3 flex items-center gap-2">
                                                🏆 Système de Points
                                            </h3>
                                            <p className="text-white/80 text-sm mb-3">
                                                Les joueurs sont classés selon leurs points totaux, calculés à partir de leur position dans chaque partie :
                                            </p>
                                            <div className="grid grid-cols-5 gap-3 text-center text-sm">
                                                <div className="bg-amber-500/20 border border-amber-500/40 rounded-lg p-2">
                                                    <div className="font-bold text-amber-300 text-xl">10</div>
                                                    <div className="text-white/60 text-xs">1ère place</div>
                                                </div>
                                                <div className="bg-slate-500/20 border border-slate-400/40 rounded-lg p-2">
                                                    <div className="font-bold text-slate-300 text-xl">6</div>
                                                    <div className="text-white/60 text-xs">2e place</div>
                                                </div>
                                                <div className="bg-amber-700/20 border border-amber-700/40 rounded-lg p-2">
                                                    <div className="font-bold text-amber-400 text-xl">4</div>
                                                    <div className="text-white/60 text-xs">3e place</div>
                                                </div>
                                                <div className="bg-blue-500/20 border border-blue-500/40 rounded-lg p-2">
                                                    <div className="font-bold text-blue-300 text-xl">2</div>
                                                    <div className="text-white/60 text-xs">4e place</div>
                                                </div>
                                                <div className="bg-white/10 border border-white/20 rounded-lg p-2">
                                                    <div className="font-bold text-white text-xl">1</div>
                                                    <div className="text-white/60 text-xs">5e+ place</div>
                                                </div>
                                            </div>
                                        </div>

                                        {getPlayerStats().map(([player, stats], index) => (
                                            <div key={player} className="bg-gradient-to-br from-slate-800/80 to-slate-900/80 backdrop-blur-sm rounded-xl border border-white/10 p-6">
                                                <div className="flex items-center gap-4 mb-4">
                                                    <div className={`w-12 h-12 rounded-full flex items-center justify-center font-bold ${
                                                        index === 0 ? 'bg-gradient-to-br from-amber-400 to-amber-600 text-slate-900' :
                                                        index === 1 ? 'bg-gradient-to-br from-slate-300 to-slate-400 text-slate-900' :
                                                        index === 2 ? 'bg-gradient-to-br from-amber-700 to-amber-800 text-white' :
                                                        'bg-slate-700 text-white'
                                                    }`}>
                                                        {index === 0 ? <Crown className="w-6 h-6" /> : index + 1}
                                                    </div>
                                                    <div className="flex-1">
                                                        <h3 className="text-2xl font-bold text-white">{player}</h3>
                                                        <p className="text-sm text-amber-400 font-semibold">{stats.points} points</p>
                                                    </div>
                                                </div>
                                                <div className="grid grid-cols-4 gap-4">
                                                    <div>
                                                        <p className="text-2xl font-bold text-emerald-400">{stats.wins}</p>
                                                        <p className="text-xs text-white/60">Victoires</p>
                                                    </div>
                                                    <div>
                                                        <p className="text-2xl font-bold text-white">{stats.games}</p>
                                                        <p className="text-xs text-white/60">Parties</p>
                                                    </div>
                                                    <div>
                                                        <p className="text-2xl font-bold text-amber-400">{stats.eliminations}</p>
                                                        <p className="text-xs text-white/60">Éliminations</p>
                                                    </div>
                                                    <div>
                                                        <p className="text-2xl font-bold text-red-400">{stats.eliminated}</p>
                                                        <p className="text-xs text-white/60">Éliminé</p>
                                                    </div>
                                                </div>
                                                <div className="mt-4 pt-4 border-t border-white/10">
                                                    <div className="flex items-center justify-between text-sm">
                                                        <span className="text-white/60">Taux de victoire</span>
                                                        <span className="font-bold text-emerald-400">
                                                            {((stats.wins / stats.games) * 100).toFixed(1)}%
                                                        </span>
                                                    </div>
                                                    <div className="mt-2 h-2 bg-black/40 rounded-full overflow-hidden">
                                                        <div 
                                                            className="h-full bg-gradient-to-r from-emerald-500 to-emerald-600 rounded-full transition-all"
                                                            style={{ width: `${(stats.wins / stats.games) * 100}%` }}
                                                        ></div>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}
                    </main>

                    <footer className="relative border-t border-white/10 bg-black/30 backdrop-blur-sm mt-16">
                        <div className="max-w-7xl mx-auto px-6 py-6 text-center text-white/40 text-sm">
                            <p>Poker Trophy Tracker • Données sauvegardées localement dans votre navigateur</p>
                        </div>
                    </footer>
                </div>
            );
        };

        ReactDOM.render(<PokerTrophyTracker />, document.getElementById('root'));
    </script>


</body></html>
